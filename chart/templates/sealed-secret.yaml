{{- if .Values.secrets.enabled }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: personal-site-secrets
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    database-url: 
    postgres-password: 
  template:
    metadata:
      name: personal-site-secrets
      namespace: {{ .Release.Namespace }}
{{- end }}
